    - data:
        code: |
          def main(sex: str, age: int, height: int, weight: int) -> dict:
              bmi = weight / (height / 100) ** 2
              
              # 基于性别和年龄的体脂率估算公式（参考美国海军快速法）
              if sex.lower() == '男':
                  body_fat_percentage = (1.20 * bmi) + (0.23 * age) - 16.2
              elif sex.lower() == '女':
                  body_fat_percentage = (1.20 * bmi) + (0.23 * age) - 5.4
              else:
                  body_fat_percentage = (1.20 * bmi) + (0.23 * age) - 10.8
              
              # 确保体脂率在合理范围内
              body_fat_percentage = max(0, min(body_fat_percentage, 100))
              
              # 添加体脂率健康等级评估
              if sex.lower() == '男':
                  if body_fat_percentage < 6:
                      level = "过瘦"
                  elif body_fat_percentage <= 13:
                      level = "运动员级"
                  elif body_fat_percentage <= 17:
                      level = "健康"
                  elif body_fat_percentage <= 25:
                      level = "偏高"
                  else:
                      level = "肥胖"
              else:
                  if body_fat_percentage < 14:
                      level = "过瘦"
                  elif body_fat_percentage <= 20:
                      level = "运动员级"
                  elif body_fat_percentage <= 24:
                      level = "健康"
                  elif body_fat_percentage <= 31:
                      level = "偏高"
                  else:
                      level = "肥胖"
              
              return {
                  "bmi": round(bmi, 1),
                  "body_fat_percentage": round(body_fat_percentage, 1),
                  "body_fat_level": level
              }
        code_language: python3
