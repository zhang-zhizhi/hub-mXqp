            1. 体脂率状态解读：简单说明当前体脂率属于什么水平，对健康的影响。
            2. 饮食建议：根据用户的体脂和年龄，提供针对性的饮食调整建议。
            3. 运动建议：推荐适合用户年龄和体脂状况的运动类型和频率。
            4. 注意事项：如年龄相关的特殊注意点（如代谢变化、骨骼健康等）。
            
